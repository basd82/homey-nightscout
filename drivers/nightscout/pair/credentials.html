<!doctype html>
<html>
<head>
  <meta charset="utf-8">
</head>
<body>
  <fieldset>
    <legend data-i18n="pair.title">Nightscout settings</legend>

    <div class="field row">
      <label data-i18n="pair.url">Nightscout URL</label>
      <input id="url" type="url" placeholder="https://..." />
    </div>

    <div class="field row">
      <label data-i18n="pair.credential">API secret or token</label>
      <input id="credential" type="password" />
    </div>

    <div class="field row">
      <label data-i18n="pair.unit">Glucose unit</label>
      <select id="unit">
        <option value="mmol">mmol/L</option>
        <option value="mgdl">mg/dL</option>
      </select>
    </div>
  </fieldset>

  <button id="test" class="homey-button-primary-full" data-i18n="pair.test">Test connection</button>

  <script>
    function translateElement(element) {
      const key = element.getAttribute('data-i18n');
      if (!key || !window.Homey || typeof Homey.__ !== 'function') return;
      const translated = Homey.__(key);
      if (translated) element.textContent = translated;
    }

    document.querySelectorAll('[data-i18n]').forEach(translateElement);

    document.getElementById('test').addEventListener('click', async () => {
      const button = document.getElementById('test');
      button.disabled = true;

      try {
        await Homey.emit('credentials', {
          url: document.getElementById('url').value.trim(),
          credential: document.getElementById('credential').value.trim(),
          unit: document.getElementById('unit').value
        });

        Homey.showView('list_devices');
      } catch (err) {
        Homey.alert(err.message || String(err), 'error');
      } finally {
        button.disabled = false;
      }
    });
  </script>
</body>
</html>
