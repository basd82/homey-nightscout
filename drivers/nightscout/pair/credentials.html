<!doctype html>
<html>
<head><meta charset="utf-8"></head>
<body>
  <fieldset>
    <legend>Nightscout</legend>
    <div class="field row"><label>URL</label><input id="url" type="url" placeholder="https://..." /></div>
    <div class="field row"><label>API-secret of token</label><input id="credential" type="password" /></div>
    <div class="field row"><label>Eenheid</label><select id="unit"><option value="mmol">mmol/L</option><option value="mgdl">mg/dL</option></select></div>
  </fieldset>
  <button id="test" class="homey-button-primary-full">Test verbinding</button>
  <script>
    document.getElementById('test').addEventListener('click', async () => {
      const button = document.getElementById('test');
      button.disabled = true;
      try {
        await Homey.emit('credentials', {
          url: document.getElementById('url').value.trim(),
          credential: document.getElementById('credential').value.trim(),
          unit: document.getElementById('unit').value
        });
        Homey.showView('list_devices');
      } catch (err) {
        Homey.alert(err.message || String(err), 'error');
      } finally {
        button.disabled = false;
      }
    });
  </script>
</body>
</html>
